<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @page { size: A4; margin: 2cm; }
    body { font-family: "DejaVu Sans", Arial, sans-serif; color: #1e293b; font-size: 11px; }
    h1 { color: #0f172a; font-size: 20px; margin-bottom: 2px; }
    .subtitle { color: #475569; font-size: 11px; margin-bottom: 18px; }
    .meta { color: #64748b; font-size: 10px; margin-bottom: 18px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background-color: #0f172a; color: #f8fafc; text-align: left; padding: 6px 8px; font-size: 10px; }
    td { padding: 6px 8px; border-bottom: 1px solid #e2e8f0; font-size: 10px; }
    .accent { color: #b45309; font-weight: bold; }
    .footer { margin-top: 24px; font-size: 9px; color: #94a3b8; }
</style>
</head>
<body>
<h1>{% block title %}Report{% endblock %}</h1>
<div class="subtitle">Equipment Tracking System — <span class="accent">{% block report_type %}{% endblock %}</span></div>
<div class="meta">
    Generated: {{ generated_at }}
    {% if date_from %} &middot; Period: {{ date_from }} to {{ date_to }}{% endif %}
</div>
{% block content %}{% endblock %}
<div class="footer">Confidential — internal equipment tracking record.</div>
</body>
</html>
